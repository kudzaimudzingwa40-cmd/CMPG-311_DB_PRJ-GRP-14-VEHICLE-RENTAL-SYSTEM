{% extends "base.html" %}
{% block title %}Review trip | DriveFlow Rental{% endblock %}

{% block content %}
<section class="auth-card">
    <p class="eyebrow">Trip review</p>
    <h1>{{ booking.year }} {{ booking.make }} {{ booking.model }}</h1>
    <form method="post">
        <label><span>Rating</span><select name="rating">{% for i in [5,4,3,2,1] %}<option value="{{ i }}">{{ i }} stars</option>{% endfor %}</select></label>
        <label><span>Comment</span><textarea name="comment" rows="4"></textarea></label>
        <button class="button" type="submit">Submit review</button>
    </form>
</section>
{% endblock %}
