{% extends "base.html" %}
{% block title %}Register | DriveFlow Rental{% endblock %}

{% block content %}
<section class="auth-card">
    <p class="eyebrow">Create account</p>
    <h1>Start earning rental rewards</h1>
    <form method="post">
        <label><span>Full name</span><input name="name" required></label>
        <label><span>Email</span><input type="email" name="email" required></label>
        <label><span>License number</span><input name="license" required></label>
        <label><span>Password</span><input type="password" name="password" minlength="6" required></label>
        <button class="button" type="submit">Create account</button>
    </form>
</section>
{% endblock %}
