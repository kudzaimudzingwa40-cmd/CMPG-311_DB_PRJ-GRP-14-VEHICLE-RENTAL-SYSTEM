{% extends "base.html" %}
{% block title %}Sign in | DriveFlow Rental{% endblock %}

{% block content %}
<section class="auth-card">
    <p class="eyebrow">Welcome back</p>
    <h1>Sign in</h1>
    <form method="post">
        <label><span>Email</span><input type="email" name="email" required></label>
        <label><span>Password</span><input type="password" name="password" required></label>
        <button class="button" type="submit">Sign in</button>
    </form>
    <div class="demo-accounts" aria-label="Demo accounts">
        <p class="muted">Demo accounts</p>
        <span>Customer: customer@driveflow.com / customer123</span>
        <span>Staff: staff@driveflow.com / staff123</span>
        <span>Admin: admin@driveflow.com / admin123</span>
    </div>
</section>
{% endblock %}
